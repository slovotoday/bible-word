<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>slovo.today</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
padding:30px;
color:#111;
}

.card{
max-width:720px;
width:100%;
text-align:center;
}

.label{
font-size:12px;
letter-spacing:4px;
text-transform:uppercase;
color:#999;
margin-bottom:32px;
}

.line{
width:80px;
height:1px;
background:#e5e5e5;
margin:0 auto 40px;
}

.verse{
font-size:40px;
line-height:1.6;
font-weight:200;
letter-spacing:-0.5px;
margin-bottom:24px;
transition:opacity .35s ease;
}

.ref{
font-size:14px;
color:#999;
letter-spacing:1px;
transition:opacity .35s ease;
}

.btn{
margin-top:50px;
padding:16px 30px;
background:#fff;
border:1px solid #ddd;
border-radius:999px;
font-size:14px;
letter-spacing:.5px;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

.footer{
margin-top:24px;
font-size:12px;
color:#bbb;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card{
animation:fadeIn .8s ease;
}

</style>

</head>

<body>

<div class="card">

<div class="label">slovo.today</div>

<div class="line"></div>

<div id="verse" class="verse"></div>

<div id="ref" class="ref"></div>

<button class="btn" onclick="newVerse()">
Отримати інше слово
</button>

<div class="footer">
торкнись брелка знову, щоб отримати нове слово
</div>

</div>

<script>

const verses = [

{
text:"Не бійся, бо Я з тобою.",
ref:"Ісая 41:10"
},

{
text:"Будь сильний і мужній.",
ref:"Ісус Навин 1:9"
},

{
text:"Любов ніколи не перестає.",
ref:"1 Коринтян 13:8"
},

{
text:"Для Бога немає нічого неможливого.",
ref:"Луки 1:37"
},

{
text:"Мир залишаю вам.",
ref:"Івана 14:27"
},

{
text:"Просіть — і буде дано вам.",
ref:"Матвія 7:7"
},

{
text:"Шукайте і знайдете.",
ref:"Матвія 7:7"
},

{
text:"Все можу в Тому, Хто мене зміцнює.",
ref:"Филип'ян 4:13"
},

{
text:"Господь — мій Пастир.",
ref:"Псалом 23:1"
},

{
text:"Світло світить у темряві.",
ref:"Івана 1:5"
},

{
text:"Радійте завжди.",
ref:"1 Солунян 5:16"
},

{
text:"Надійся на Господа всім серцем.",
ref:"Приповісті 3:5"
}

];

function newVerse(){

const random =
verses[Math.floor(Math.random()*verses.length)];

const verse =
document.getElementById("verse");

const ref =
document.getElementById("ref");

verse.style.opacity = 0;
ref.style.opacity = 0;

setTimeout(()=>{

verse.innerText = random.text;
ref.innerText = random.ref;

verse.style.opacity = 1;
ref.style.opacity = 1;

},200);

}

newVerse();

</script>

</body>
</html>
