<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Слово для тебе</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:#fafafa;

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

color:#111;
cursor:pointer;

padding:24px;
}

.card{
width:100%;
max-width:380px;

display:flex;
flex-direction:column;
align-items:center;

text-align:center;
}

.logo{
font-size:11px;
letter-spacing:6px;
text-transform:uppercase;

color:#b8b8b8;

margin-bottom:24px;
}

.verse{
font-size:42px;
font-weight:200;

line-height:1.12;
letter-spacing:-1px;

margin-bottom:18px;

transition:opacity .35s ease;
}

.ref{
font-size:11px;

letter-spacing:2px;

text-transform:uppercase;

color:#9c9c9c;

transition:opacity .35s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(8px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.card{
animation:fadeIn .7s ease;
}

</style>

</head>

<body onclick="newVerse()">

<div class="card">

<div class="logo">
слово для тебе
</div>

<div id="verse" class="verse"></div>

<div id="ref" class="ref"></div>

</div>

<script>

const verses = [

{text:"Не бійся, бо Я з тобою.",ref:"Ісая 41:10"},

{text:"Для Бога немає нічого неможливого.",ref:"Луки 1:37"},

{text:"Все можу в Тому, Хто мене зміцнює.",ref:"Филип'ян 4:13"},

{text:"Надійся на Господа всім серцем своїм.",ref:"Приповісті 3:5"},

{text:"Не турбуйтеся про завтрашній день.",ref:"Матвія 6:34"},

{text:"Любов ніколи не перестає.",ref:"1 Коринтян 13:8"},

{text:"Господь близький до всіх, хто кличе Його.",ref:"Псалом 145:18"},

{text:"Я є дорога, правда і життя.",ref:"Івана 14:6"},

{text:"Світло світить у темряві.",ref:"Івана 1:5"},

{text:"Мир залишаю вам, мир Мій даю вам.",ref:"Івана 14:27"}

];

function newVerse(){

const random =
verses[Math.floor(Math.random()*verses.length)];

const verse =
document.getElementById("verse");

const ref =
document.getElementById("ref");

verse.style.opacity=0;
ref.style.opacity=0;

setTimeout(()=>{

verse.innerText=random.text;
ref.innerText=random.ref;

verse.style.opacity=1;
ref.style.opacity=1;

},180);

}

newVerse();

</script>

</body>
</html>
