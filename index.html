<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слово для тебе</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
height:100vh;display:flex;justify-content:center;align-items:center;
background:#fafafa;padding:24px;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:#111;cursor:pointer;
}
.card{max-width:380px;width:100%;text-align:center;}
.logo{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:#b8b8b8;margin-bottom:36px;}
.verse{font-size:42px;font-weight:200;line-height:1.15;letter-spacing:-1px;margin-bottom:36px;transition:opacity .35s ease;}
.ref{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#9c9c9c;transition:opacity .35s ease;}
</style>
</head>
<body onclick="newVerse()">
<div class="card">
<div class="logo">слово для тебе</div>
<div id="verse" class="verse"></div>
<div id="ref" class="ref"></div>
</div>
<script>
const verses = [{"text": "Господь — мій Пастир, я не матиму нестачі", "ref": "Псалом 23:1"}, {"text": "Не бійся, бо Я з тобою, не тривожся, бо Я твій Бог. Я зміцню тебе і допоможу тобі, підтримаю тебе правицею Моєї праведності", "ref": "Ісаї 41:10"}, {"text": "Надійся на Господа всім своїм серцем, а на власний розум не покладайся", "ref": "Приповістей 3:5"}, {"text": "Ми знаємо, що тим, хто любить Бога і покликаний за Його задумом, усе сприяє до добра", "ref": "Римлян 8:28"}, {"text": "Я все можу в Тому, Хто мене зміцнює", "ref": "Филип’ян 4:13"}, {"text": "Мир залишаю вам, Мій мир Я даю вам. Я даю вам не так, як дає світ. Нехай не тривожиться ваше серце і не лякається", "ref": "Івана 14:27"}, {"text": "Ні про що не турбуйтеся, а в усьому молитвою та благанням з подякою відкривайте свої прохання Богові", "ref": "Филип’ян 4:6"}, {"text": "Покладіть на Нього всі свої турботи, бо Він дбає про вас", "ref": "1 Петра 5:7"}, {"text": "Бог для нас — притулок і сила, надійна допомога в бідах", "ref": "Псалом 46:2"}, {"text": "Бо Я знаю ті задуми, які маю щодо вас, — говорить Господь, — задуми на добро, а не на зло, щоб дати вам майбутнє і надію", "ref": "Єремії 29:11"}, {"text": "Поклади на Господа свої турботи, і Він тебе підтримає", "ref": "Псалом 55:23"}, {"text": "Чи ж Я не наказав тобі: будь мужнім і сильним? Не бійся і не лякайся, бо з тобою Господь, твій Бог, куди б ти не пішов", "ref": "Ісуса Навина 1:9"}, {"text": "Господь — моє світло і моє спасіння: кого мені боятися?", "ref": "Псалом 27:1"}, {"text": "А ті, що надіються на Господа, відновлять сили, піднімуть крила, мов орли, побіжать — і не втомляться, підуть — і не знесиляться", "ref": "Ісаї 40:31"}, {"text": "Шукайте насамперед Царства Божого та Його праведності, а все це вам додасться", "ref": "Матвія 6:33"}, {"text": "Господь за мене — я не злякаюся. Що може зробити мені людина?", "ref": "Псалом 118:6"}, {"text": "Ім’я Господа — міцна вежа: праведник утікає до неї й перебуває в безпеці", "ref": "Приповістей 18:10"}, {"text": "Довір Господу свій шлях і надійся на Нього — і Він подіє", "ref": "Псалом 37:5"}, {"text": "Будьте мужніми та сильними, не бійтеся... бо Господь, твій Бог, Сам іде з тобою", "ref": "Повторення Закону 31:6"}, {"text": "Підводжу свої очі до гір: звідки прийде мені допомога? Моя допомога від Господа, Який створив небо і землю", "ref": "Псалом 121:1-2"}, {"text": "Любов довго терпить, любов милосердствує, не заздрить, любов не хваstatusться, не пишається", "ref": "1 Коринтян 13:4"}, {"text": "А тепер залишаються віра, надія, любов — оці три, але найбільша з них — любов", "ref": "1 Коринтян 13:13"}, {"text": "Хто не любить, той не пізнав Бога, тому що Бог є любов", "ref": "1 Івана 4:8"}, {"text": "Ніхто не має більшої любові за ту, коли хтось життя своє віддає за своїх друзів", "ref": "Івана 15:13"}, {"text": "Ми любимо Його, бо Він перший полюбив нас", "ref": "1 Івана 4:19"}, {"text": "Люби Господа Бога свого всім серцем своїм... Люби свого ближнього, як самого себе", "ref": "Матвія 22:37-39"}, {"text": "Усе у вас хай робиться з любов’ю", "ref": "1 Коринтян 16:14"}, {"text": "А понад усе це одягніться в любов, яка є союзом досконалості", "ref": "Колосян 3:14"}, {"text": "Будьте ж один до одного лагідними, милосердними, прощаючи один одному, як і Бог у Христі простив вам", "ref": "Ефесян 4:32"}, {"text": "Насамперед майте щиру любов один до одного, бо любов покриває багато гріхів", "ref": "1 Петра 4:8"}, {"text": "Дітоньки, любімо не словом чи язиком, а ділом та правдою", "ref": "1 Івана 3:18"}, {"text": "Любов нехай буде нелицемірною; ненавидьте зло, тримайтеся добра", "ref": "Римлян 12:9"}, {"text": "Друг любить повсякчас, а в біді стає братом", "ref": "Приповістей 17:17"}, {"text": "І як хочете, щоб вам чинили люди, так і ви чиніть їм", "ref": "Луки 6:31"}, {"text": "Адже весь Закон виконується в одному вислові: Люби свого ближнього, як самого себе", "ref": "Галатів 5:14"}, {"text": "Бо так Бог полюбив світ, що дав Свого Єдинородного Сина, щоб кожен, хто вірить у Нього, не загинув, але мав життя вічне", "ref": "Івана 3:16"}, {"text": "Адже ви спасенні благодаттю через віру, і це не від вас, це дар Божий; не від діл, щоб ніхто не хвалився", "ref": "Ефесян 2:8-9"}, {"text": "Бо якщо ти своїми устами визнаєш Ісуса Господом і повіриш у своєму серці, що Бог воскресив Його з мертвих, то спасешся", "ref": "Римлян 10:9"}, {"text": "Каже йому Ісус: Я є дорога, і правда, і життя. Ніхто не приходить до Отця, як тільки через Мене", "ref": "Івана 14:6"}, {"text": "Адже плата за гріх — смерть, а Божий дар — вічне життя в Христі Ісусі, нашому Господі", "ref": "Римлян 6:23"}, {"text": "І ні в кому іншому немає спасіння, бо під небом немає іншого імені, даного людям, яким належало б нам спастися", "ref": "Дій 4:12"}, {"text": "Ось Я стою під дверима і стукаю. Якщо хтось почує Мій голос і відчинить двері, Я ввійду до нього", "ref": "Об’явлення 3:20"}, {"text": "Але Бог виявляє Свою любов до нас тим, що Христос помер за нас, коли ми були ще грішниками", "ref": "Римлян 5:8"}, {"text": "Віра є підставою сподіваного, доказом речей невидимих", "ref": "Євреїв 11:1"}, {"text": "Ісус же сказав йому: ... Усе можливе тому, хто вірить", "ref": "Марка 9:23"}, {"text": "Сказав їй Ісус: Я є воскресіння і життя; хто вірить у Мене, хоч і помре, житиме", "ref": "Івана 11:25"}, {"text": "І вже не живу я, а живе в мені Христос", "ref": "Галатів 2:20"}, {"text": "Тому, коли хтось у Христі, той — нове створіння; старе минуло, ось сталося нове", "ref": "2 Коринтян 5:17"}, {"text": "А тим, які прийняли Його, дав їм владу стати Божими дітьми — тим, які вірять у Його Ім’я", "ref": "Івана 1:12"}, {"text": "Хто має Сина, той має життя; хто не має Сина Божого, той не має життя", "ref": "1 Івана 5:12"}, {"text": "Твоє Слово — світильник для моїх ніг і світло для моєї стежки", "ref": "Псалом 119:105"}, {"text": "Якщо комусь із вас бракує мудрості, нехай просить у Бога, Який дає всім щедро і не дорікає, — і буде дана йому", "ref": "Якова 1:5"}, {"text": "Страх перед Господом — початок мудрості", "ref": "Приповістей 1:7"}, {"text": "Усе Писання богонатхненне й корисне для навчання, для докору, для виправлення, для виховання в праведності", "ref": "2 Тимофія 3:16"}, {"text": "Тож підкоріться Богові, протистаньте дияволу — і він утече від вас", "ref": "Якова 4:7"}, {"text": "Просіть — і дасться вам; шукайте — і знайдете; стукайте — і відчинять вам", "ref": "Mатвія 7:7"}, {"text": "Понад усе, що зберігається, бережи своє серце, бо з нього б’ють джерела життя", "ref": "Приповістей 4:23"}, {"text": "Блаженний чоловік, який не ходить на раду нечестивих... але в Законі Господньому його воля", "ref": "Псалом 1:1-2"}, {"text": "Чого Господь вимагає від тебе? Тільки чинити справедливість, любити милосердя і смиренно ходити перед твоїм Богом", "ref": "Михея 6:8"}, {"text": "І не пристосовуйтеся до цього віку, але змінюйтеся оновленням вашого розуму", "ref": "Римлян 12:2"}, {"text": "Будьте ж виконавцями слова, а не тільки слухачами, які самі себе обманюють", "ref": "Якова 1:22"}, {"text": "Лагідна відповідь відвертає гнів, а образливе слово викликає лють", "ref": "Приповістей 15:1"}, {"text": "Шукайте Господа, доки Його можна знайти, кличте Його, доки Він близько", "ref": "Ісаї 55:6"}, {"text": "Не обманюйтеся: Бог зневажений не буває. Що людина посіє, те й пожне", "ref": "Галатів 6:7"}, {"text": "Хай так світить ваше світло перед людьми, щоб вони бачили ваші добрі діла і прославляли вашого Отця, Який на небесах", "ref": "Матвія 5:16"}, {"text": "Якщо визнаємо свої гріхи, то Він є вірний і праведний, щоб простити нам гріхи й очистити нас від усякої неправди", "ref": "1 Івана 1:9"}, {"text": "Прийдіть і розсудимо, — говорить Господь. — Якщо ваші гріхи будуть як багряниця, вибілю як сніг", "ref": "Ісаї 1:18"}, {"text": "Як далеко схід від заходу, так віддалив Він від нас наші беззаконня", "ref": "Псалом 103:12"}, {"text": "Це милість Господня, що ми не вигублені, бо не вичерпалося Його співчуття. Воно оновлюється щоранку; велика Твоя вірність", "ref": "Плач Єремії 3:22-23"}, {"text": "Серце чисте створи в мені, Боже, і духа правого віднови в нутрі моєму", "ref": "Псалом 51:12"}, {"text": "У Ньому маємо викуплення Його кров’ю, прощення провин, через багатство Його благодаті", "ref": "Ефесян 1:7"}, {"text": "Терпіть один одного і прощайте взаємно, якщо хтось проти когось має образу; як Господь простив вам, так само й ви робіть", "ref": "Колосян 3:13"}, {"text": "Отже, тепер немає жодного осуду тим, які в Христі Ісусі", "ref": "Римлян 8:1"}, {"text": "Бо Ти, Господи, добрий і прощаєш, і многомилостивий до всіх, хто кличе Тебе", "ref": "Псалом 86:5"}, {"text": "Я, Я Сам стираю твої провини заради Себе і не згадаю твоїх гріхів", "ref": "Ісаї 43:25"}, {"text": "Та Він сказав мені: Досить тобі Моєї благодаті, бо сила Моя виявляється в немочі", "ref": "2 Коринтян 12:9"}, {"text": "Одягніться в повну Божу зброю, щоб ви могли протистояти підступам диявола", "ref": "Ефесян 6:11"}, {"text": "Вас спіткала тільки людська спокуса. Але вірний Бог, Який не попустить, щоб ви були спокушувані більше, ніж можете перенести", "ref": "1 Коринтян 10:13"}, {"text": "Блаженний чоловік, який витримає спокусу, бо, ставши випробуваним, він одержить вінець життя", "ref": "Якова 1:12"}, {"text": "Коли я йду навіть долиною тіні смерті, я не злякаюся зла, бо Ти зі мною", "ref": "Псалом 23:4"}, {"text": "Що ж скажемо на це? Якщо Бог за нас, то хто проти нас?", "ref": "Римлян 8:31"}, {"text": "Ви від Бога, дітоньки, і ви перемогли їх, бо Той, Хто у вас, більший за того, хто у світі", "ref": "1 Івана 4:4"}, {"text": "Господь — моя сила і мій щит; на Нього надіялося моє серце, і Він допоміг мені", "ref": "Псалом 28:7"}, {"text": "Адже Бог дав нам не духа боягузтва, а духа сили, любові й поміркованості", "ref": "2 Тимофія 1:7"}, {"text": "Не військом і не силою, а Моїм Духом! — говорить Господь Саваот", "ref": "Захарії 4:6"}, {"text": "Усе, що дихає, хай хвалить Господа! Алілуя!", "ref": "Псалом 150:6"}, {"text": "Завжди радійте, безперестанно моліться, за все дякуйте, бо це Божа воля в Христі Ісусі щодо вас", "ref": "1 Солунян 5:16-18"}, {"text": "Прославляйте Господа, бо Він добрий, бо навіки Його милість", "ref": "Псалом 106:1"}, {"text": "Достойний Ти, Господи і Боже наш, прийняти славу, і честь, і силу, бо Ти все створив", "ref": "Об’явлення 4:11"}, {"text": "Небеса розповідають про Божу славу, а про витвір Його рук сповіщає небосхил", "ref": "Псалом 19:2"}, {"text": "Дякуйте Господу, бо Він добрий, бо навіки Його милість", "ref": "1 Хронік 16:34"}, {"text": "Прийдіть, заспіваймо Господу, вигукнімо скелі нашого спасіння", "ref": "Псалом 95:1"}, {"text": "Радійте в Господі завжди, і знову кажу: радійте", "ref": "Филип’ян 4:4"}, {"text": "Благословлятиму Господа повсякчас, хвала Його завжди на моїх устах", "ref": "Псалом 34:2"}, {"text": "То я буду радіти в Господі, буду ликувати в Бозі, моєму Спасителеві", "ref": "Авакума 3:18"}, {"text": "І Я даю їм вічне життя, і вони не загинуть повік, і ніхто не викраде їх з Моїх рук", "ref": "Івана 10:28"}, {"text": "І Він витре кожну сльозу з їхніх очей, і смерті вже не буде, ні смутку, ні крику, ні болю вже не буде, бо колишнє минуло", "ref": "Об’явлення 21:4"}, {"text": "І ось Я з вами по всі дні аж до кінця віку", "ref": "Матвія 28:20"}, {"text": "Чого око не бачило й вухо не чуло і що на серце людині не приходило, те Бог приготував тим, які люблять Його", "ref": "1 Коринтян 2:9"}, {"text": "Ісус Христос учора, сьогодні й навіки Той Самий", "ref": "Євреїв 13:8"}];
let lastIndex = -1;
function newVerse(){
 let randomIndex;
 do {
   randomIndex = Math.floor(Math.random()*verses.length);
 } while(randomIndex === lastIndex && verses.length>1);
 lastIndex = randomIndex;
 const random = verses[randomIndex];
 const verse = document.getElementById("verse");
 const ref = document.getElementById("ref");
 verse.style.opacity=0; ref.style.opacity=0;
 setTimeout(()=>{
   verse.innerText=random.text;
   ref.innerText=random.ref;
   verse.style.opacity=1;
   ref.style.opacity=1;
 },180);
}
newVerse();
</script>
</body>
</html>
