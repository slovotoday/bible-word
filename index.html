<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Слово для тебе</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:32px;
color:#111;
}

.card{
max-width:700px;
text-align:center;
animation:fadeIn .8s ease;
}

.label{
font-size:12px;
letter-spacing:4px;
text-transform:uppercase;
color:#999;
margin-bottom:40px;
}

.line{
width:80px;
height:1px;
background:#ddd;
margin:0 auto 40px;
}

.verse{
font-size:40px;
line-height:1.6;
font-weight:300;
margin-bottom:18px;
}
  
 .ref{
font-size:14px;
color:#999;
letter-spacing:1px;
margin-bottom:30px;
} 

.btn{
margin-top:40px;
padding:14px 24px;
background:white;
border:1px solid #ddd;
border-radius:999px;
font-size:14px;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<div class="label">слово для тебе</div>

<div class="line"></div>

<div id="verse" class="verse"></div>
<div id="ref" class="ref"></div>
<button class="btn" onclick="newVerse()">
Отримати інше слово
</button>

</div>

<script>

const verses = [

{
text:"Не бійся, бо Я з тобою.",
ref:"Ісая 41:10"
},

{
text:"Будь сильний і мужній.",
ref:"Ісус Навин 1:9"
},

{
text:"Любов ніколи не перестає.",
ref:"1 Коринтян 13:8"
},

{
text:"Для Бога немає нічого неможливого.",
ref:"Луки 1:37"
}

];

function newVerse(){

const verse =
verses[Math.floor(Math.random()*verses.length)];

const block =
document.getElementById("verse");

const ref =
document.getElementById("ref");

block.style.opacity=0;
ref.style.opacity=0;

setTimeout(()=>{

block.innerText = verse.text;

ref.innerText = verse.ref;

block.style.opacity=1;
ref.style.opacity=1;

},200);

}

newVerse();

</script>

</body>
</html>
