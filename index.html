<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>слово дня</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
padding:30px;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
color:#111;
cursor:pointer;
}

.card{
max-width:300px;
width:100%;
text-align:center;

display:flex;
flex-direction:column;
justify-content:center;

height:100vh;
}

.logo{
font-size:11px;
letter-spacing:8px;
text-transform:uppercase;
color:#b0b0b0;
margin-bottom:20px;
}

.line{
width:50px;
height:1px;
background:#e5e5e5;
margin:0 auto 60px;
}

.verse{
font-size:52px;
line-height:1.35;
font-weight:200;
letter-spacing:-1.5px;

min-height:160px;

display:flex;
align-items:center;
justify-content:center;

margin-bottom:25px;

transition:opacity .4s ease;
}

.ref{
font-size:11px;
letter-spacing:3px;
text-transform:uppercase;
color:#999;

margin-bottom:40px;

transition:opacity .4s ease;
}

.footer{
font-size:11px;
letter-spacing:1px;
color:#c7c7c7;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body onclick="newVerse()">

<div class="card">

<div class="logo">SLOVO.TODAY</div>

<div class="line"></div>

<div id="verse" class="verse"></div>

<div id="ref" class="ref"></div>

<div class="footer">
торкнись знову для нового слова
</div>

</div>

<script>

const verses = [

{text:"Не бійся, бо Я з тобою.",ref:"Ісая 41:10"},
{text:"Будь сильний і мужній.",ref:"Ісус Навин 1:9"},
{text:"Любов ніколи не перестає.",ref:"1 Коринтян 13:8"},
{text:"Для Бога немає нічого неможливого.",ref:"Луки 1:37"},
{text:"Мир залишаю вам.",ref:"Івана 14:27"},
{text:"Просіть — і буде дано вам.",ref:"Матвія 7:7"},
{text:"Шукайте і знайдете.",ref:"Матвія 7:7"},
{text:"Все можу в Тому, Хто мене зміцнює.",ref:"Филип'ян 4:13"},
{text:"Господь — мій Пастир.",ref:"Псалом 23:1"},
{text:"Світло світить у темряві.",ref:"Івана 1:5"},
{text:"Радійте завжди.",ref:"1 Солунян 5:16"},
{text:"Надійся на Господа всім серцем.",ref:"Приповісті 3:5"},
{text:"Блаженні миротворці.",ref:"Матвія 5:9"},
{text:"Господь близький до всіх, хто кличе Його.",ref:"Псалом 145:18"},
{text:"Твоя віра спасла тебе.",ref:"Марка 10:52"},
{text:"Я є дорога, правда і життя.",ref:"Івана 14:6"},
{text:"Не турбуйтеся про завтрашній день.",ref:"Матвія 6:34"},
{text:"Бог є любов.",ref:"1 Івана 4:8"},
{text:"Радість Господня — ваша сила.",ref:"Неємія 8:10"},
{text:"Мир вам.",ref:"Івана 20:19"}

];

function newVerse(){

const random =
verses[Math.floor(Math.random()*verses.length)];

const verse =
document.getElementById("verse");

const ref =
document.getElementById("ref");

verse.style.opacity=0;
ref.style.opacity=0;

setTimeout(()=>{

verse.innerText=random.text;
ref.innerText=random.ref;

verse.style.opacity=1;
ref.style.opacity=1;

},250);

}

newVerse();

</script>

</body>
</html>
