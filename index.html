<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Слово для тебе</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:32px;
color:#111;
}

.card{
max-width:700px;
text-align:center;
animation:fadeIn .8s ease;
}

.label{
font-size:12px;
letter-spacing:4px;
text-transform:uppercase;
color:#999;
margin-bottom:40px;
}

.line{
width:80px;
height:1px;
background:#ddd;
margin:0 auto 40px;
}

.verse{
font-size:34px;
line-height:1.6;
font-weight:300;
margin-bottom:20px;
}

.btn{
margin-top:40px;
padding:14px 24px;
background:white;
border:1px solid #ddd;
border-radius:999px;
font-size:14px;
cursor:pointer;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="card">

<div class="label">слово для тебе</div>

<div class="line"></div>

<div id="verse" class="verse"></div>

<button class="btn" onclick="newVerse()">
Отримати інше слово
</button>

</div>

<script>

const verses = [

"Не бійся, бо Я з тобою. — Ісая 41:10",

"Будь сильний і мужній. — Ісус Навин 1:9",

"Любов ніколи не перестає. — 1 Коринтян 13:8",

"Просіть — і буде дано вам. — Матвія 7:7",

"Господь — мій Пастир. — Псалом 23:1",

"Для Бога немає нічого неможливого. — Луки 1:37",

"Мир залишаю вам. — Івана 14:27",

"Радійте завжди. — 1 Солунян 5:16",

"Блаженні миротворці. — Матвія 5:9",

"Надійся на Господа всім серцем. — Приповісті 3:5",

"Все можу в Тому, Хто мене зміцнює. — Филип'ян 4:13",

"Шукайте і знайдете. — Матвія 7:7",

"Господь близький до всіх, хто кличе Його. — Псалом 145:18",

"Світло світить у темряві. — Івана 1:5",

"Будьте добрі один до одного. — Ефесян 4:32"

];

function newVerse(){

const verse =
verses[Math.floor(Math.random()*verses.length)];

const block =
document.getElementById("verse");

block.style.opacity=0;

setTimeout(()=>{
block.innerText=verse;
block.style.opacity=1;
},200);

}

newVerse();

</script>

</body>
</html>
